<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Boro - Deine Verleih-App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Boro">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/favicon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png"/>

  <title>Boro - Deine Verleih-App</title>
  <link rel="manifest" href="manifest.json">

  <!-- File Upload Configuration -->
  <script>
    // The value below is injected by flutter build, do not touch.
    
    // Enable file uploads
    window.addEventListener('load', function() {
      // Create a hidden file input
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      document.body.appendChild(fileInput);

      // Listen for file selection
      fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
          const file = e.target.files[0];
          // Send the file to Flutter
          window.dispatchEvent(new CustomEvent('file_selected', {
            detail: {
              name: file.name,
              type: file.type,
              size: file.size,
              lastModified: file.lastModified,
              path: URL.createObjectURL(file)
            }
          }));
        }
      });

      // Expose the file input to Flutter
      window.showFilePicker = function() {
        fileInput.click();
      };
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
